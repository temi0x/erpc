# eRPC config: every upstream `endpoint` uses ${ERPC_RPC_*}. Set values in `.env` (see .env.example)
# or in your deployment platform's environment. `godotenv` loads `.env` from cwd on startup.
#
# Same sections as before: chainlist.wtf primary rows, then ADDED extras.

logLevel: info

database:
  evmJsonRpcCache:
    connectors:
      - id: memory-cache
        driver: memory
    policies:
      - network: "*"
        method: "*"
        finality: realtime
        empty: allow
        connector: memory-cache
        ttl: 2s
      - network: "*"
        method: "*"
        finality: unfinalized
        empty: allow
        connector: memory-cache
        ttl: 10s
      - network: "*"
        method: "*"
        finality: finalized
        empty: allow
        connector: memory-cache
        ttl: 0

server:
  httpHostV4: 0.0.0.0
  httpPortV4: 4000
  maxTimeout: 50s

metrics:
  enabled: true
  hostV4: 0.0.0.0
  port: 4001

projects:
  - id: main
    upstreamDefaults:
      failsafe:
        - matchMethod: "*"
          timeout:
            duration: 20s
          retry:
            maxAttempts: 2
            delay: 400ms
    networks:
      - architecture: evm
        evm:
          chainId: 1
        failsafe:
          timeout:
            duration: 30s
          retry:
            maxAttempts: 3
            delay: 500ms
            backoffMaxDelay: 10s
            backoffFactor: 0.3
            jitter: 500ms
          hedge:
            delay: 2000ms
            maxCount: 2
      - architecture: evm
        evm:
          chainId: 10
        failsafe:
          timeout:
            duration: 30s
          retry:
            maxAttempts: 3
            delay: 500ms
            backoffMaxDelay: 10s
            backoffFactor: 0.3
            jitter: 500ms
          hedge:
            delay: 2000ms
            maxCount: 2
      - architecture: evm
